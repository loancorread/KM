<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hoja de Respuestas - Ensayo SIMCE</title>
    <!-- Tailwind CSS para el diseño rápido y profesional -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Fuente Inter de Google Fonts para un toque moderno y legible -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <!-- Librería html2pdf.js para generar el PDF directamente -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js" xintegrity="sha512-GsLlZN/3F2ErC5ifS5QtgpiJtWd43JWSuIgh7mbzZ8zBps+dvLusV+eNQATqgA/HdeKFVgA5v3S/cIrLF7QnIg==" crossorigin="anonymous" referrerpolicy="no-referrer"></script>
    
    <style>
        body {
            font-family: 'Inter', sans-serif;
            background-color: #f3f4f6; /* Fondo gris claro solo para visualización web */
        }
        
        /* Estilos específicos para impresión y generación de PDF */
        @media print {
            body {
                background-color: white;
                -webkit-print-color-adjust: exact;
                print-color-adjust: exact;
            }
            .print-container {
                box-shadow: none !important;
                margin: 0 !important;
                padding: 0 !important;
                width: 100% !important;
                max-width: 100% !important;
            }
            .no-print {
                display: none !important;
            }
            @page {
                size: letter;
                margin: 0;
            }
        }

        /* Utilidad para forzar que los colores de fondo se impriman en el PDF */
        .force-bg {
            -webkit-print-color-adjust: exact;
            print-color-adjust: exact;
        }
    </style>
</head>
<body class="text-gray-900 py-8 text-sm sm:text-base">

    <!-- Botón para descargar PDF (se oculta en el documento final) -->
    <div class="w-[8.5in] max-w-full mx-auto mb-4 flex justify-end no-print px-4">
        <button onclick="descargarPDF()" class="bg-blue-600 hover:bg-blue-700 text-white font-semibold py-2 px-6 rounded-lg shadow-md transition duration-200 flex items-center gap-2">
            <!-- Icono de descarga -->
            <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path>
                <polyline points="7 10 12 15 17 10"></polyline>
                <line x1="12" y1="15" x2="12" y2="3"></line>
            </svg>
            Descargar PDF
        </button>
    </div>

    <!-- Contenedor principal de la hoja (Medida estricta Carta) -->
    <div class="print-container w-[8.5in] h-[11in] max-w-full mx-auto bg-white p-8 sm:p-10 shadow-xl rounded-sm border border-gray-200 relative flex flex-col" id="documento-pdf">
        
        <!-- Encabezado -->
        <div class="text-right mb-2">
            <p class="text-xs sm:text-sm font-semibold tracking-wide text-gray-600 uppercase">Ensayo SIMCE Lenguaje 4º Básico</p>
        </div>
        
        <div class="text-center mb-6">
            <h1 class="text-2xl sm:text-3xl font-bold tracking-tight mb-1">HOJA DE RESPUESTAS</h1>
            <div class="h-1 w-24 bg-black mx-auto mt-2"></div>
        </div>

        <!-- Sección de Datos del Alumno -->
        <div class="space-y-4 mb-6">
            <div class="flex items-end gap-2">
                <label class="font-semibold whitespace-nowrap">Nombre:</label>
                <div class="flex-grow border-b-2 border-black h-5"></div>
            </div>
            <div class="flex items-end gap-6">
                <div class="flex items-end gap-2 flex-grow">
                    <label class="font-semibold whitespace-nowrap">Curso:</label>
                    <div class="flex-grow border-b-2 border-black h-5"></div>
                </div>
                <div class="flex items-end gap-2 flex-grow">
                    <label class="font-semibold whitespace-nowrap">Fecha:</label>
                    <div class="flex-grow border-b-2 border-black h-5"></div>
                </div>
            </div>
        </div>

        <!-- Instrucciones y Ejemplo -->
        <div class="bg-gray-50 border-l-4 border-gray-800 p-4 rounded-r-md mb-6 force-bg text-sm">
            <p class="mb-2">Selecciona una alternativa para cada pregunta, marcando con una <strong>X</strong> el cuadrado que corresponda.</p>
            <p class="mb-3">Si te equivocas, borra con cuidado y vuelve a marcar.</p>
            
            <div class="flex items-center gap-4 bg-white p-2 border border-gray-200 rounded inline-flex">
                <span class="font-semibold text-gray-500">Ejemplo:</span>
                <div class="flex items-center gap-2">
                    <span class="w-6 text-right font-bold">30.</span>
                    <div class="flex gap-2">
                        <div class="w-7 h-7 border-2 border-gray-400 rounded-sm flex items-center justify-center font-bold text-gray-500 text-xs">A</div>
                        <div class="w-7 h-7 border-2 border-black rounded-sm flex items-center justify-center font-bold text-black text-lg leading-none">X</div>
                        <div class="w-7 h-7 border-2 border-gray-400 rounded-sm flex items-center justify-center font-bold text-gray-500 text-xs">C</div>
                        <div class="w-7 h-7 border-2 border-gray-400 rounded-sm flex items-center justify-center font-bold text-gray-500 text-xs">D</div>
                    </div>
                </div>
            </div>
        </div>

        <div class="mb-4 border-b-2 border-black pb-1">
            <h2 class="text-lg font-bold uppercase tracking-wider">Preguntas de Alternativas</h2>
            <p class="text-xs text-gray-600">Marcar alternativa correcta</p>
        </div>

        <!-- Grilla de Preguntas (Generada dinámicamente) -->
        <div class="grid grid-cols-1 md:grid-cols-3 gap-x-6 gap-y-1" id="questions-grid">
            <!-- Las preguntas se insertarán aquí con JavaScript -->
        </div>

    </div>

    <!-- Script para generar las alternativas y el PDF -->
    <script>
        document.addEventListener("DOMContentLoaded", () => {
            const gridContainer = document.getElementById('questions-grid');
            
            // Definimos las columnas y sus rangos de preguntas
            const columns = [
                { start: 1, end: 13 },
                { start: 14, end: 26 },
                { start: 27, end: 34 }
            ];

            columns.forEach(col => {
                // Crear contenedor de la columna
                const colDiv = document.createElement('div');
                // Se redujo el espacio vertical (space-y-2) para evitar el salto de página
                colDiv.className = 'flex flex-col space-y-[0.45rem]';

                for (let i = col.start; i <= col.end; i++) {
                    // Crear fila de pregunta
                    const rowDiv = document.createElement('div');
                    rowDiv.className = 'flex items-center gap-2';

                    // Número de pregunta
                    const numSpan = document.createElement('span');
                    numSpan.className = 'w-6 text-right font-bold text-sm sm:text-base';
                    numSpan.textContent = `${i}.`;

                    // Contenedor de alternativas
                    const optionsDiv = document.createElement('div');
                    optionsDiv.className = 'flex gap-2';

                    // Letras A, B, C, D
                    ['A', 'B', 'C', 'D'].forEach(letter => {
                        const box = document.createElement('div');
                        box.className = 'w-7 h-7 sm:w-8 sm:h-8 border-[1.5px] border-black rounded-sm flex items-center justify-center font-semibold text-gray-800 text-xs sm:text-sm';
                        box.textContent = letter;
                        optionsDiv.appendChild(box);
                    });

                    rowDiv.appendChild(numSpan);
                    rowDiv.appendChild(optionsDiv);
                    colDiv.appendChild(rowDiv);
                }

                gridContainer.appendChild(colDiv);
            });
        });

        // Función para generar y descargar el PDF
        function descargarPDF() {
            const elemento = document.getElementById('documento-pdf');
            
            // Opciones de configuración para el PDF ajustadas
            const opciones = {
                // Margen en 0: El documento HTML ya tiene `p-10` (padding) que actúa como el borde blanco
                margin:       0, 
                filename:     'Hoja_de_Respuestas_SIMCE.pdf',
                image:        { type: 'jpeg', quality: 0.98 },
                html2canvas:  { scale: 2, useCORS: true },
                jsPDF:        { unit: 'in', format: 'letter', orientation: 'portrait' }
            };

            // Generar y guardar el PDF
            html2pdf().set(opciones).from(elemento).save();
        }
    </script>

</body>
</html>
